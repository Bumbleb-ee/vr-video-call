<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Video Call</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; overflow: hidden; }
    .ui-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 16px;
      color: white;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 320px;
    }
    .ui-panel h3 { font-size: 18px; margin-bottom: 10px; color: #00ff88; }
    .input-row { display: flex; gap: 8px; margin: 12px 0; }
    .input-row input {
      flex: 1; padding: 10px; border-radius: 8px;
      border: none; font-size: 14px;
      background: rgba(255,255,255,0.15); color: white;
    }
    .input-row input::placeholder { color: #aaa; }
    .input-row button {
      padding: 10px 18px; background: #00aa55;
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: bold;
    }
    .input-row button:hover { background: #00cc66; }
    .status { font-size: 13px; color: #aaa; margin-top: 5px; }
    .status.connected { color: #00ff88; }
    .status.error { color: #ff4444; }
  </style>
</head>
<body>

<a-scene>
  <a-sky color="#1a1a2e"></a-sky>
  <a-plane position="0 0 0" rotation="-90 0 0"
           width="20" height="20" color="#2d2d44"></a-plane>
  <a-box position="0 2.5 -6" width="14" height="6"
         depth="0.1" color="#223"></a-box>
  <a-box position="-7 2.5 0" width="0.1" height="6"
         depth="20" color="#223"></a-box>
  <a-box position="7 2.5 0" width="0.1" height="6"
         depth="20" color="#223"></a-box>
  <a-plane position="0 5 0" rotation="90 0 0"
           width="20" height="20" color="#1a1a2e"></a-plane>
  <a-video src="#localVideo" position="-2.5 2.2 -5"
           width="3.5" height="2.5" rotation="0 10 0"></a-video>
  <a-text value="YOU" position="-2.5 3.8 -5"
          align="center" color="#00ff88" width="5"></a-text>
  <a-video src="#remoteVideo" position="2.5 2.2 -5"
           width="3.5" height="2.5" rotation="0 -10 0"></a-video>
  <a-text value="REMOTE USER" position="2.5 3.8 -5"
          align="center" color="#00aaff" width="5"></a-text>
  <a-text value="VR Video Call - Young Innovator's Lab"
          position="0 4.5 -5" align="center"
          color="white" width="8"></a-text>
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="point" position="0 5 0"
           color="#ffffff" intensity="1.2"></a-light>
  <a-light type="point" position="-3 3 -3"
           color="#00ff88" intensity="0.5"></a-light>
  <a-light type="point" position="3 3 -3"
           color="#00aaff" intensity="0.5"></a-light>
  <a-camera position="0 1.6 3" wasd-controls look-controls>
    <a-cursor color="yellow"></a-cursor>
  </a-camera>
</a-scene>

<video id="localVideo" autoplay muted playsinline
       style="display:none"></video>
<video id="remoteVideo" autoplay playsinline
       style="display:none"></video>

<div class="ui-panel">
  <h3>VR Video Call</h3>
  <p>Your ID: <strong id="my-id">Connecting...</strong></p>
  <div class="input-row">
    <input id="peer-input" placeholder="Paste friend's ID here..." />
    <button onclick="callPeer()">Call</button>
  </div>
  <p id="status" class="status">Starting...</p>
</div>

<script>
var localStream;
var peer;

function setStatus(msg, type) {
  var s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + (type || '');
}

function attachRemoteStream(stream) {
  var rv = document.getElementById('remoteVideo');
  rv.srcObject = stream;
  rv.play();
  setStatus('Connected!', 'connected');
}

function callPeer() {
  var peerId = document.getElementById('peer-input').value.trim();
  if (!peerId) { alert('Enter Peer ID!'); return; }
  var call = peer.call(peerId, localStream);
  call.on('stream', function(remoteStream) {
    attachRemoteStream(remoteStream);
  });
}

function startPeer() {
  peer = new Peer();
  peer.on('open', function(id) {
    document.getElementById('my-id').textContent = id;
    setStatus('Ready! Share your ID.', 'connected');
  });
  peer.on('call', function(call) {
    call.answer(localStream);
    call.on('stream', function(remoteStream) {
      attachRemoteStream(remoteStream);
    });
  });
  peer.on('error', function(err) {
    setStatus('Peer error: ' + err.type, 'error');
  });
}

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
  .then(function(stream) {
    localStream = stream;
    var lv = document.getElementById('localVideo');
    lv.srcObject = stream;
    lv.play();
    setStatus('Camera ready!', 'connected');
    startPeer();
  })
  .catch(function(err) {
    setStatus('Camera error: ' + err.message, 'error');
  });
</script>

</body>
</html>
